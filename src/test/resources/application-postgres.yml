spring:
  datasource:
    url: jdbc:postgresql://${test.host:localhost}:5432/test
    driverClassName: org.postgresql.Driver
    username: ${test.username:postgres}
    password: ${test.password:postgres}
    hikari:
      maximum-pool-size: 1200

sync-session:
  timeout: 30m
  clazz: pers.clare.test.session.TokenSession
  ds:
    table-name: test_session
